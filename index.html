<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Usuarios</title>
    <link rel="stylesheet" href="Frontend/css/estilos.css">
</head>
<body>

    <div id="app" style="display: none;">
        
        <div id="auth-container" class="container">
            <div id="inicio-welcome">
                <h1>🚀 Sistema de Gestión</h1>
                <p class="subtitle">Usuarios • Roles • Permisos</p>
                <div style="margin-bottom: 20px;">
                    <button id="btnIniciarSesion" class="btn" onclick="navegarA('login')">🔐 Iniciar Sesión</button>
                </div>
                <div class="status">
                    <span>🌐 BD Estado: </span>
                    <span class="server" id="serverStatus">Verificando...</span>
                </div>
            </div>

            <div id="content-view"></div> 
        </div>

        <div id="main-dashboard" style="display: none;"></div>

    </div>

    <script src="Frontend/js/main.js"></script>
    <script src="Frontend/js/login.js"></script>
    <script src="Frontend/js/principal.js"></script>
    <script src="Frontend/js/usuario.js"></script>
    <script src="Frontend/js/rol.js"></script>
    <script src="Frontend/js/menu.js"></script>
    <script src="Frontend/js/permiso.js"></script>
</body>
</html>
