<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Usuarios</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            max-width: 400px;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 40px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            margin: 5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 0.9em;
        }
        .status .server {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Sistema de Gestión</h1>
        <p class="subtitle">Usuarios • Roles • Permisos</p>
        
        <div>
            <a href="Frontend/html/login.html" class="btn">🔐 Iniciar Sesión</a>
            <br><br>
            <a href="Backend/test_conexion.php" target="_blank" class="btn btn-secondary">🧪 Probar Conexión Directa</a>
        </div>
        
        <div class="status">
            <span>🌐 BD Estado: </span>
            <span class="server" id="serverStatus">Verificando...</span>
        </div>
    </div>

    <script>
        // Apuntamos al archivo dentro de la carpeta Backend
        fetch('Backend/test_conexion.php')
        .then(response => {
            if (!response.ok) {
                throw new Error('Error en el servidor');
            }
            return response.json();
        })
        .then(data => {
            // Si la BD responde de manera exitosa
            const statusElem = document.getElementById('serverStatus');
            statusElem.textContent = '✅ Conectado a ' + data.server;
            statusElem.style.color = '#90EE90';
        })
        .catch(error => {
            // Si el servicio de BD está apagado o el archivo no existe
            const statusElem = document.getElementById('serverStatus');
            statusElem.textContent = '❌ Desconectado';
            statusElem.style.color = '#FF6B6B';
            console.error('Detalles del error:', error);
        });
    </script>
</body>
</html>
