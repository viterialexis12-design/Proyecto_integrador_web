<div class="modulo-container" style="width: 100%; box-sizing: border-box;">
    <div class="modulo-header" style="border-bottom: 2px solid #fecaca; padding-bottom: 10px; margin-bottom: 20px;">
        <h2 style="color: #b91c1c; margin: 0 0 5px 0;">🔴 Desactivar Cuenta de Usuario</h2>
        <p style="color: #6b7280; margin: 0;">Busca y selecciona el usuario que deseas dar de baja en la plataforma.</p>
    </div>

    <div class="buscador-modulo-container" style="position: relative; margin: 20px 0; width: 100%;">
        <label for="txtBuscarParaEliminar" style="font-weight: bold; display: block; margin-bottom: 5px;">Seleccione el usuario a dar de baja:</label>
        <input type="text" id="txtBuscarParaEliminar" placeholder="🔍 Escribe cédula, nombre o username..." style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box;">
        <div id="listaSugerenciasEliminar" style="position: absolute; width: 100%; background: white; border: 1px solid #d1d5db; border-radius: 0 0 4px 4px; z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box;"></div>
    </div>

    <div id="contenedorFichaEliminar" style="display: none; border-top: 2px solid #ef4444; padding-top: 20px; width: 100%;">
        <div class="confirm-box" style="background-color: #fef2f2; border: 1px solid #fecaca; padding: 20px; border-radius: 6px; margin-bottom: 20px; box-sizing: border-box; width: 100%;">
            <p style="margin: 5px 0;"><b>ID:</b> <span id="lblDelIdUsuario">-</span></p>
            <p style="margin: 5px 0;"><b>Nombre Completo:</b> <span id="lblDelNombreCompleto">-</span></p>
            <p style="margin: 5px 0;"><b>Cédula:</b> <span id="lblDelCedula">-</span></p>
            <p style="margin: 5px 0;"><b>Username:</b> <span id="lblDelUsername">-</span></p>
            <p style="margin: 5px 0;"><b>Estado Actual:</b> <span id="lblDelEstado">-</span></p>
        </div>

        <div id="divAvisoBloqueo" style="display: none; background-color: #fee2e2; padding: 15px; border-radius: 4px; color: #991b1b; margin-bottom: 20px; box-sizing: border-box; width: 100%;">
            ⚠️ <b>Aviso:</b> Este usuario es un Administrador del sistema y no puede ser desactivado.
        </div>

        <div id="divAccionesEliminar" style="display: flex; justify-content: flex-end; gap: 15px; width: 100%;">
            <button type="button" id="btnCancelarEliminar" class="btn btn-secondary">Cancelar</button>
            <button type="button" id="btnConfirmarEliminar" class="btn" style="background-color: #dc2626; color: white;">🔴 Confirmar Inactivación</button>
        </div>
    </div>
</div>
