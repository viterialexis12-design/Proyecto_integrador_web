<div class="modulo-container">
    <div class="modulo-header">
        <h2>➕ Registrar Nuevo Módulo / Menú</h2>
        <p>Añade una nueva categoría principal al panel de navegación.</p>
    </div>

    <form id="formCrearMenu" class="form-grid" style="max-width: 600px; margin: 0 auto;">
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Nombre del Menú *</label>
            <input type="text" name="nombre" placeholder="Ej: Facturación" required style="width:100%; padding:10px;">
        </div>

        <div class="form-group">
            <label>Descripción / Detalles del Menú</label>
            <input type="text" name="descripcion" placeholder="Ej: Acceso a reportes del sistema">
        </div>
        <div class="form-group">
            <label>ID Rol Propietario *</label>
            <input type="text" name="id_rol" placeholder="Ej: ROL0000001" required>
        </div>

        <div class="form-actions" style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
            <button type="button" id="btnCancelarCrearMenu" class="btn btn-secondary">Limpiar</button>
            <button type="submit" class="btn btn-primary">💾 Guardar Menú</button>
        </div>
    </form>
</div>
