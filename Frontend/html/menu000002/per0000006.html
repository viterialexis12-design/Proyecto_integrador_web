<div class="modulo-container">
    <div class="modulo-header">
        <h2>✏️ Modificar Módulo o Menú</h2>
        <p>Busca un menú para actualizar sus propiedades visuales o de orden jerárquico.</p>
    </div>

    <div class="buscador-modulo-container" style="position: relative; margin-bottom: 25px;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">Seleccione el menú a modificar:</label>
        <input type="text" id="txtBuscarParaEditarMenu" placeholder="🔍 Escribe el nombre del menú..."
            style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px;">
        <div id="listaSugerenciasEditarMenu"
            style="position: absolute; width: 100%; background: white; border: 1px solid #ccc; border-top: none; z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        </div>
    </div>

    <div id="contenedorFormEditarMenu" style="display: none; border-top: 2px solid #e2e8f0; padding-top: 20px;">
        <form id="formEditarMenu" class="form-grid" style="max-width: 600px; margin: 0 auto;">
            <input type="hidden" id="txtEditCodigoMenu" name="codigo_menu">

            <div class="form-group" style="margin-bottom: 15px;">
                <label>Nombre del Menú *</label>
                <input type="text" id="txtEditMenuNombre" name="nombre" required style="width:100%; padding:10px;">
            </div>

            <div class="form-group">
                <label>Descripción / Detalles del Menú</label>
                <input type="text" id="txtEditMenuDescripcion" name="descripcion" placeholder="Ej: Acceso a reportes del sistema">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label>Estado</label>
                <select id="cmbEditMenuEstado" name="estado" style="width:100%; padding:10px;">
                    <option value=1>Activo</option>
                    <option value=0>Inactivo</option>
                </select>
            </div>

            <div class="form-actions" style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" id="btnCancelarEditarMenu" class="btn btn-secondary">Cancelar</button>
                <button type="submit" class="btn btn-primary">💾 Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
