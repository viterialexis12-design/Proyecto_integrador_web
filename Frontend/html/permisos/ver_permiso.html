<div class="modulo-container">
    <div class="modulo-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <div>
            <h2>🔑 Catálogo de Permisos del Sistema</h2>
            <p>Lista de acciones y accesos detallados asignados a los módulos.</p>
        </div>
        <button id="btnRefrescarPermisos" class="btn btn-secondary">🔄 Actualizar Lista</button>
    </div>

    <div class="table-tools" style="margin-bottom: 20px;">
        <input type="text" id="txtBuscarPermiso" placeholder="🔍 Filtrar por ID, nombre de permiso o menú asociado..." style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem;">
    </div>

    <div class="table-responsive" style="overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 6px;">
        <table class="main-table" style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem;">
            <thead style="background-color: #2c3e50; color: #ffffff;">
                <tr>
                    <th style="padding: 12px 15px;">ID Permiso</th>
                    <th style="padding: 12px 15px;">Nombre del Permiso</th>
                    <th style="padding: 12px 15px;">Menú Asociado</th>
                    <th style="padding: 12px 15px;">Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyPermisos">
                <tr>
                    <td colspan="4" style="padding: 20px; text-align: center; color: #7f8c8d;">Cargando registros...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
