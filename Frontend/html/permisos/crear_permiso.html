<div class="modulo-container">
    <div class="modulo-header">
        <h2>➕ Registrar Nuevo Permiso</h2>
        <p>Crea una nueva acción enlazada a un módulo específico con sus respectivos detalles.</p>
    </div>

    <form id="formCrearPermiso" class="form-grid" style="max-width: 600px; margin: 0 auto;">
        <div class="form-group" style="margin-bottom: 15px;">
            <label for="txtPermisoNombre" style="font-weight: bold; display: block; margin-bottom: 5px;">Nombre del Permiso *</label>
            <input type="text" id="txtPermisoNombre" name="nombre_permiso" placeholder="Ej: Crear Usuarios" required style="width:100%; padding:10px;">
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="txtPermisoDesc" style="font-weight: bold; display: block; margin-bottom: 5px;">Descripción / Detalles *</label>
            <input type="text" id="txtPermisoDesc" name="descripcion" placeholder="Ej: Permite registrar nuevos usuarios en el sistema" required style="width:100%; padding:10px;">
        </div>

        <div class="form-group" style="position: relative; margin-bottom: 15px;">
            <label for="txtMenuAsociadoCrear" style="font-weight: bold; display: block; margin-bottom: 5px;">Asociar a un Menú / Módulo *</label>
            <input type="text" id="txtMenuAsociadoCrear" placeholder="🔍 Escribe para buscar el menú..." required style="width:100%; padding:10px;">
            <input type="hidden" id="txtMenuCodigoCrear" name="codigo_menu">
            <div id="sugerenciasMenuCrear" style="position: absolute; width: 100%; background: white; border: 1px solid #ccc; border-top: none; z-index: 100; max-height: 180px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></div>
        </div>

        <div class="form-actions" style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
            <button type="button" id="btnCancelarCrearPermiso" class="btn btn-secondary">Limpiar</button>
            <button type="submit" class="btn btn-primary">💾 Guardar Permiso</button>
        </div>
    </form>
</div>
