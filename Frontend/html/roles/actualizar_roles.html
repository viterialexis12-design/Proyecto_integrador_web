<div class="modulo-container">
    <div class="modulo-header">
        <h2>✏️ Modificar Rol</h2>
        <p>Busca un rol por su nombre para cambiar sus detalles.</p>
    </div>

    <div class="buscador-modulo-container" style="position: relative; margin-bottom: 25px;">
        <label for="txtBuscarParaEditarRol" style="font-weight: bold; display: block; margin-bottom: 5px;">Seleccione el rol a modificar:</label>
        <input type="text" id="txtBuscarParaEditarRol" placeholder="🔍 Escribe el nombre del rol..." style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px;">
        <div id="listaSugerenciasEditarRol" style="position: absolute; width: 100%; background: white; border: 1px solid #ccc; border-top: none; z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></div>
    </div>

    <div id="contenedorFormEditarRol" style="display: none; border-top: 2px solid #e2e8f0; padding-top: 20px;">
        <form id="formEditarRol" class="form-grid" style="max-width: 600px; margin: 0 auto;">
            <input type="hidden" id="txtEditIdRol" name="id_rol">

            <div class="form-group" style="margin-bottom: 15px;">
                <label>Nombre del Rol *</label>
                <input type="text" id="txtEditRolNombre" name="nombre" required style="width:100%; padding:10px;">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label>Descripción</label>
                <textarea id="txtEditRolDescripcion" name="descripcion" rows="3" style="width:100%; padding:10px; resize:none;"></textarea>
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label>Estado</label>
                <select id="cmbEditRolEstado" name="estado" style="width:100%; padding:10px;">
                    <option value="A">Activo</option>
                    <option value="I">Inactivo</option>
                </select>
            </div>

            <div class="form-actions" style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" id="btnCancelarEditarRol" class="btn btn-secondary">Cancelar</button>
                <button type="submit" class="btn btn-primary">💾 Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
