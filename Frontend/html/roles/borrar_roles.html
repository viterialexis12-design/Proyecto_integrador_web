<div class="modulo-container" style="max-width: 700px; margin: 0 auto;">
    <div class="modulo-header" style="border-bottom: 2px solid #f5c6cb; padding-bottom: 10px;">
        <h2 style="color: #c0392b;">🔴 Desactivar Rol</h2>
        <p>Busca un perfil para darlo de baja en el sistema.</p>
    </div>

    <div class="buscador-modulo-container" style="position: relative; margin: 20px 0;">
        <label for="txtBuscarParaEliminarRol" style="font-weight: bold; display: block; margin-bottom: 5px;">Seleccione el rol a dar de baja:</label>
        <input type="text" id="txtBuscarParaEliminarRol" placeholder="🔍 Escribe el nombre del rol..." style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px;">
        <div id="listaSugerenciasEliminarRol" style="position: absolute; width: 100%; background: white; border: 1px solid #ccc; border-top: none; z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></div>
    </div>

    <div id="contenedorFichaEliminarRol" style="display: none; border-top: 2px solid #e74c3c; padding-top: 20px;">
        <div class="confirm-box" style="background-color: #fdf2f2; border: 1px solid #f5c6cb; padding: 20px; border-radius: 6px; margin-bottom: 20px;">
            <p style="margin: 5px 0;"><b>ID Rol:</b> <span id="lblDelIdRol">-</span></p>
            <p style="margin: 5px 0;"><b>Nombre del Rol:</b> <span id="lblDelRolNombre">-</span></p>
            <p style="margin: 5px 0;"><b>Descripción:</b> <span id="lblDelRolDesc">-</span></p>
            <p style="margin: 5px 0;"><b>Estado Actual:</b> <span id="lblDelRolEstado">-</span></p>
        </div>

        <div style="display: flex; justify-content: center; gap: 15px;">
            <button type="button" id="btnCancelarEliminarRol" class="btn btn-secondary">Cancelar</button>
            <button type="button" id="btnConfirmarEliminarRol" class="btn" style="background-color: #e74c3c; color: white; padding: 12px 25px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold;">🔴 Confirmar Inactivación</button>
        </div>
    </div>
</div>
