<div class="modulo-container">
    <div class="modulo-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <div>
            <h2>🔑 Gestión de Roles y Perfiles</h2>
            <p>Visualiza los niveles de acceso configurados en el sistema.</p>
        </div>
        <button id="btnRefrescarRoles" class="btn btn-secondary" style="padding: 8px 15px; font-size: 0.85rem;">🔄 Actualizar Lista</button>
    </div>

    <div class="table-tools" style="margin-bottom: 20px;">
        <input type="text" id="txtBuscarRol" placeholder="🔍 Buscar por nombre de rol o descripción..." style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem;">
    </div>

    <div class="table-responsive" style="overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 6px;">
        <table class="main-table" style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem;">
            <thead style="background-color: #2c3e50; color: #ffffff;">
                <tr>
                    <th style="padding: 12px 15px;">Nombre del Rol</th>
                    <th style="padding: 12px 15px;">Descripción</th>
                    <th style="padding: 12px 15px;">Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyRoles">
                <tr>
                    <td colspan="3" style="padding: 20px; text-align: center; color: #7f8c8d;">Cargando registros...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
