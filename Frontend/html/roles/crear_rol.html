<div class="modulo-container">
    <div class="modulo-header">
        <h2>➕ Registrar Nuevo Rol</h2>
        <p>Define un nuevo perfil de acceso para los usuarios del sistema.</p>
    </div>

    <form id="formCrearRol" class="form-grid" style="max-width: 600px; margin: 0 auto;">
        <div class="form-group" style="margin-bottom: 15px;">
            <label for="txtRolNombre" style="font-weight: bold; display: block; margin-bottom: 5px;">Nombre del Rol *</label>
            <input type="text" id="txtRolNombre" name="nombre" placeholder="Ej: Supervisor de Inventario" required style="width:100%; padding:10px;">
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label for="txtRolDescripcion" style="font-weight: bold; display: block; margin-bottom: 5px;">Descripción</label>
            <textarea id="txtRolDescripcion" name="descripcion" placeholder="Describe brevemente qué acciones puede realizar este rol..." rows="3" style="width:100%; padding:10px; resize:none;"></textarea>
        </div>

        <div class="form-actions" style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
            <button type="button" id="btnCancelarCrearRol" class="btn btn-secondary">Limpiar</button>
            <button type="submit" class="btn btn-primary">💾 Guardar Rol</button>
        </div>
    </form>
</div>
