<div class="modulo-container" style="width: 100%; box-sizing: border-box;">
    <div class="modulo-header" style="border-bottom: 2px solid #f5c6cb; padding-bottom: 10px; margin-bottom: 20px;">
        <h2 style="color: #c0392b; margin-bottom: 5px;">🔴 Desactivar Rol</h2>
        <p style="color: #7f8c8d; margin-top: 0; font-size: 0.95rem;">Busca un perfil para darlo de baja en el sistema.</p>
    </div>

    <div class="buscador-modulo-container" style="position: relative; margin-bottom: 25px; width: 100%;">
        <label for="txtBuscarParaEliminarRol" style="font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem; color: #34495e;">Seleccione el rol a dar de baja:</label>
        <input type="text" id="txtBuscarParaEliminarRol" placeholder="🔍 Escribe el nombre del rol..." style="width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem;">
        <div id="listaSugerenciasEliminarRol" style="position: absolute; width: 100%; background: white; border: 1px solid #ccc; border-top: none; z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 0 0 4px 4px; box-sizing: border-box;"></div>
    </div>

    <div id="contenedorFichaEliminarRol" style="display: none; border-top: 2px solid #e74c3c; padding-top: 20px; width: 100%;">
        <div id="boxFichaRol" class="confirm-box" style="background-color: #fdf2f2; border: 1px solid #f5c6cb; padding: 20px; border-radius: 6px; margin-bottom: 20px; font-size: 0.95rem; color: #2c3e50; width: 100%; box-sizing: border-box;">
            <p style="margin: 8px 0;"><b>ID Rol:</b> <span id="lblDelIdRol">-</span></p>
            <p style="margin: 8px 0;"><b>Nombre del Rol:</b> <span id="lblDelRolNombre">-</span></p>
            <p style="margin: 8px 0;"><b>Descripción:</b> <span id="lblDelRolDesc">-</span></p>
            <p style="margin: 8px 0;"><b>Estado Actual:</b> <span id="lblDelRolEstado">-</span></p>
            
            <div id="msgProtegidoRol" style="display: none; margin-top: 15px; padding: 10px; background-color: #ffd2d2; border: 1px solid #f5c6cb; color: #d63031; border-radius: 4px; font-weight: bold; text-align: center; box-sizing: border-box;">
                ⚠️ Este es un rol crítico del sistema y no puede ser desactivado.
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 15px; width: 100%;">
            <button type="button" id="btnCancelarEliminarRol" class="btn btn-secondary">Cancelar</button>
            <button type="button" id="btnConfirmarEliminarRol" class="btn" style="background-color: #e74c3c; color: white;">🔴 Confirmar Inactivación</button>
        </div>
    </div>
</div>
