<div class="modulo-container" style="width: 100%; box-sizing: border-box;">
    <div class="modulo-header" style="border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px;">
        <h2>✏️ Administrar Matriz de Permisos</h2>
        <p style="color: #6b7280;">Busca un rol por su nombre para modificar masivamente sus accesos modulares.</p>
    </div>

    <div class="control-group" style="margin-bottom: 25px; background: #f8fafc; padding: 20px; border-radius: 6px; border: 1px solid #e2e8f0; position: relative; width: 100%; box-sizing: border-box;">
        <label for="txtBuscarRolPermiso" style="font-weight: bold; display: block; margin-bottom: 8px; color: #334155;">Escriba el nombre del Rol a Consultar:</label>
        <input type="text" id="txtBuscarRolPermiso" placeholder="🔍 Escribe para buscar un rol... (Ej: SA, Administrador)" autocomplete="off" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 1rem; box-sizing: border-box;">
        
        <div id="listaSugerenciasRol" style="position: absolute; left: 0; right: 0; background: white; border: 1px solid #cbd5e1; border-top: none; z-index: 1000; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 0 0 4px 4px; width: 100%; box-sizing: border-box;"></div>
    </div>

    <form id="formMatrizPermisos" style="display: none; width: 100%;">
        <input type="hidden" id="txtRolSeleccionadoId" name="id_rol">
        
        <h3 style="font-size: 1.1rem; color: #1e293b; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
            🛡️ Configuración de Accesos Jerárquicos
        </h3>
        
        <div id="listaModulosEdicion" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 25px; width: 100%;">
        </div>

        <div class="form-actions" style="border-top: 1px solid #e2e8f0; padding-top: 20px; width: 100%;">
            <button type="button" id="btnCancelarMatriz" class="btn btn-secondary">Cancelar</button>
            <button type="submit" class="btn btn-primary">💾 Guardar Matriz de Permisos</button>
        </div>
    </form>
</div>
