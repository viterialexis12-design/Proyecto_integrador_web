<div class="modulo-container">
    <div class="modulo-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <div>
            <h2>👥 Gestión de Usuarios</h2>
            <p>Visualiza, busca y administra el personal registrado en la plataforma.</p>
        </div>
        <div>
            <button id="btnRefrescarUsuarios" class="btn btn-secondary" style="padding: 8px 15px; font-size: 0.85rem;">🔄 Actualizar Lista</button>
        </div>
    </div>

    <div class="table-tools" style="margin-bottom: 20px; display: flex; gap: 15px;">
        <input type="text" id="txtBuscarUsuario" placeholder="🔍 Buscar por nombre, cédula o usuario..." style="flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem;">
    </div>

    <div class="table-responsive" style="overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 6px;">
        <table id="tablaUsuarios" class="main-table" style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem;">
            <thead style="background-color: #2c3e50; color: #ffffff;">
                <tr>
                    <th style="padding: 12px 15px;">ID</th>
                    <th style="padding: 12px 15px;">Nombre Completo</th>
                    <th style="padding: 12px 15px;">Cédula</th>
                    <th style="padding: 12px 15px;">Correo</th>
                    <th style="padding: 12px 15px;">Username</th>
                    <th style="padding: 12px 15px;">Rol</th>
                    <th style="padding: 12px 15px;">Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyUsuarios">
                <tr>
                    <td colspan="8" style="padding: 20px; text-align: center; color: #7f8c8d;">Cargando registros...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
