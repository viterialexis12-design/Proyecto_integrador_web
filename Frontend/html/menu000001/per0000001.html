<div class="modulo-container">
    <div class="modulo-header">
        <h2>👤 Registrar Nuevo Usuario</h2>
        <p>Completa el siguiente formulario para dar de alta una nueva cuenta en el sistema.</p>
    </div>

    <form id="formCrearUsuario" class="form-grid" autocomplete="off">
        <div class="form-section-title">Datos Personales</div>
        
        <div class="form-group">
            <label for="txtNombre1">Primer Nombre <span class="required">*</span></label>
            <input type="text" id="txtNombre1" name="nombre1" required placeholder="Ej. Juan">
        </div>

        <div class="form-group">
            <label for="txtNombre2">Segundo Nombre</label>
            <input type="text" id="txtNombre2" name="nombre2" placeholder="Ej. Carlos">
        </div>

        <div class="form-group">
            <label for="txtApellido1">Primer Apellido <span class="required">*</span></label>
            <input type="text" id="txtApellido1" name="apellido1" required placeholder="Ej. Pérez">
        </div>

        <div class="form-group">
            <label for="txtApellido2">Segundo Apellido</label>
            <input type="text" id="txtApellido2" name="apellido2" placeholder="Ej. López">
        </div>

        <div class="form-group">
            <label for="txtCedula">Cédula / Identificación <span class="required">*</span></label>
            <input type="text" id="txtCedula" name="cedula" required placeholder="Ej. 1712345678">
        </div>

        <div class="form-group">
            <label for="txtFechaNac">Fecha de Nacimiento</label>
            <input type="date" id="txtFechaNac" name="fecha_nacimiento">
        </div>

        <div class="form-group">
            <label for="txtTelefono">Teléfono</label>
            <input type="tel" id="txtTelefono" name="telefono" placeholder="Ej. 0998765432">
        </div>

        <div class="form-group">
            <label for="txtCorreo">Correo Electrónico <span class="required">*</span></label>
            <input type="email" id="txtCorreo" name="correo" required placeholder="juan.perez@correo.com">
        </div>

        <div class="form-section-title">Credenciales de Acceso</div>

        <div class="form-group">
            <label for="txtUsername">Nombre de Usuario (Username) <span class="required">*</span></label>
            <input type="text" id="txtUsername" name="username" required placeholder="Ej. jperez">
        </div>

        <div class="form-group">
            <label for="txtClave">Contraseña <span class="required">*</span></label>
            <input type="password" id="txtClave" name="clave" required placeholder="••••••••">
        </div>

        <div class="form-group">
            <label for="cmbRol">Rol Asignado <span class="required">*</span></label>
            <select id="cmbRol" name="id_rol" required>
                <option value="">-- Seleccione un Rol --</option>
                </select>
        </div>

        <div class="form-group">
            <label for="cmbEstado">Estado Inicial</label>
            <select id="cmbEstado" name="estado">
                <option value="A" selected>Activo</option>
                <option value="I">Inactivo</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="button" id="btnCancelarUsuario" class="btn btn-secondary">Cancelar</button>
            <button type="submit" class="btn btn-primary">💾 Guardar Usuario</button>
        </div>
    </form>
</div>
