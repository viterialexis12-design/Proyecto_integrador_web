<div class="modulo-container">
    <div class="modulo-header">
        <h2>✏️ Modificar Permiso</h2>
        <p>Busca un permiso existente por su nombre para editar sus propiedades y descripción.</p>
    </div>

    <div class="buscador-modulo-container" style="position: relative; margin-bottom: 25px;">
        <label for="txtBuscarParaEditarPermiso" style="font-weight: bold; display: block; margin-bottom: 5px;">Seleccione el permiso a modificar:</label>
        <input type="text" id="txtBuscarParaEditarPermiso" placeholder="🔍 Escribe el nombre del permiso..." style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px;">
        <div id="listaSugerenciasEditarPermiso" style="position: absolute; width: 100%; background: white; border: 1px solid #ccc; border-top: none; z-index: 100; max-height: 180px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></div>
    </div>

    <div id="contenedorFormEditarPermiso" style="display: none; border-top: 2px solid #e2e8f0; padding-top: 20px;">
        <form id="formEditarPermiso" class="form-grid" style="max-width: 600px; margin: 0 auto;">
            <input type="hidden" id="txtEditIdPermiso" name="id_permiso">

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-weight: bold;">Nombre del Permiso *</label>
                <input type="text" id="txtEditPermisoNombre" name="nombre_permiso" required style="width:100%; padding:10px;">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-weight: bold;">Descripción *</label>
                <input type="text" id="txtEditPermisoDesc" name="descripcion" required style="width:100%; padding:10px;">
            </div>

            <div class="form-group" style="position: relative; margin-bottom: 15px;">
                <label style="font-weight: bold;">Cambiar Menú Asociado *</label>
                <input type="text" id="txtMenuAsociadoEditar" placeholder="🔍 Cambiar menú..." required style="width:100%; padding:10px;">
                <input type="hidden" id="txtMenuCodigoEditar" name="codigo_menu">
                <div id="sugerenciasMenuEditar" style="position: absolute; width: 100%; background: white; border: 1px solid #ccc; border-top: none; z-index: 100; max-height: 150px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"></div>
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-weight: bold;">Estado</label>
                <select id="cmbEditPermisoEstado" name="estado" style="width:100%; padding:10px;">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>
            </div>

            <div class="form-actions" style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" id="btnCancelarEditarPermiso" class="btn btn-secondary">Cancelar</button>
                <button type="submit" class="btn btn-primary">💾 Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
