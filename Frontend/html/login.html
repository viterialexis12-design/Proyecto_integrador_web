<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
</head>
<body>

<div class="login-wrapper">
    
    <div class="login-side-panel">
        
    </div>

    <div class="login-form-panel">

        <div>
            <h2 class="form-title">¡Le damos la bienvenida!</h2>
            <p class="form-subtitle">Inicie sesión en su cuenta</p>

            <form id="formLogin" class="form-group">
                
                <div class="input-container">
                    <label for="userInput">Usuario *</label>
                    <input type="text" id="userInput" class="form-control" placeholder="Usuario" required>
                </div>

                <div class="input-container" style="margin-top: 20px;">
                    <label for="passInput">Contraseña *</label>
                    <input type="password" id="passInput" class="form-control" placeholder="Contraseña" required>
                </div>

                <div class="input-container" style="margin-top: 20px;">
                    <label>Validación de Seguridad (Captcha) *</label>
                    <div class="captcha-container">
                        <div id="captchaCodeBox" class="captcha-box">XXXX</div>
                        <button type="button" id="btnRefreshCaptcha" class="btn-refresh" title="Cambiar código">🔄</button>
                    </div>
                    <input type="text" id="txtCaptchaInput" placeholder="Escriba el código de arriba" required class="form-control" style="margin-top: 10px; text-transform: uppercase;">
                </div>

                <button type="submit" class="btn">Ingresar</button>
                
                <div id="loginFeedback" class="feedback-msg" style="display: none; margin-top: 15px; padding: 10px; border-radius: 4px; text-align: center;"></div>
            </form>
            
            <button id="btnVolverInicio" class="btn btn-secondary">⬅ Volver</button>
        </div>

    </div>
</div>
</body>
</html>
