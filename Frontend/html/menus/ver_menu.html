<div class="modulo-container">
    <div class="modulo-header" style="display: flex; justify-content: space-between; align-items: center;">

        </div>
        <button id="btnRefrescarMenus" class="btn btn-secondary">🔄 Actualizar</button>

    <div class="table-tools" style="margin-bottom: 15px;">

    <div class="table-responsive">

                    <th style="padding: 12px;">Código Menú</th>
                    <th style="padding: 12px;">Nombre</th>
                    <th style="padding: 12px;">Descripcion</th>
                    <th style="padding: 12px;">Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyMenus">
                <tr><td colspan="5" style="text-align:center; padding:20px;">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
</div>
