<div class="modulo-container" style="width: 100%;">
    <div class="modulo-header">
        <h2>✏️ Modificar Módulo o Menú</h2>
        <p>Busca un menú para actualizar sus propiedades visuales o de orden jerárquico.</p>
    </div>

    <div class="buscador-modulo-container" style="position: relative; margin-bottom: 25px; width: 100%;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">Seleccione el menú a modificar:</label>
        <input type="text" id="txtBuscarParaEditarMenu" placeholder="🔍 Escribe el nombre del menú..."
            style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        <div id="listaSugerenciasEditarMenu"
            style="position: absolute; width: 100%; background: white; border: 1px solid #ccc; border-top: none; z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box;">
        </div>
    </div>

    <div id="contenedorFormEditarMenu" style="display: none; border-top: 2px solid #e2e8f0; padding-top: 20px; width: 100%;">
        <form id="formEditarMenu" class="form-grid" style="width: 100%;">
            <input type="hidden" id="txtEditIdMenu" name="id">

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">Menú Padre</label>
                <select id="cmbEditMenuPadre" name="id_menuPadre"
                    style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                    <option value="">— Ninguno (Es un menú principal / Padre) —</option>
                </select>
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">Nombre del Menú *</label>
                <input type="text" id="txtEditMenuNombre" name="nombre" required
                    style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">Descripción / Detalles del Menú</label>
                <input type="text" id="txtEditMenuDescripcion" name="descripcion"
                    placeholder="Ej: Acceso a reportes del sistema"
                    style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <div class="form-group" id="wrapperEditUrlMenu" style="margin-bottom: 15px; display: none;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">URL del Archivo HTML *</label>
                <input type="text" id="txtEditMenuUrl" name="url" placeholder="Ej: actualizar_usuario.html"
                    style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">Estado del Módulo:</label>
                <select id="txtUpdateEstadoMenu"
                    style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>

                <div id="alertaHijosUpdateMenu"
                    style="display: none; margin-top: 10px; padding: 12px; background-color: #f8d7da; border-left: 5px solid #dc3545; color: #721c24; font-weight: bold; border-radius: 4px; font-size: 14px; box-sizing: border-box;">
                    ⚠️ ¡Atención! Si cambias el estado a 'Inactivo', todos los submenús dependientes de este módulo principal también se desactivarán en cascada.
                </div>
            </div>

            <div class="form-actions">
                <button type="button" id="btnCancelarEditarMenu" class="btn btn-secondary">Cancelar</button>
                <button type="submit" class="btn btn-primary">💾 Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
