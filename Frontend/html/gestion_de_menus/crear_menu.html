<div class="modulo-container" style="width: 100%;">
    <div class="modulo-header">
        <h2>➕ Registrar Nuevo Módulo / Menú</h2>
        <p>Añade una nueva sección principal o asígnala como submenú (hijo) de una existente.</p>
    </div>

    <form id="formCrearMenu" class="form-grid" style="width: 100%;">
        <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">¿Depende de otro menú? (Padre) *</label>
            <select id="selectMenuPadre" name="id_menuPadre" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                <option value="">— Ninguno (Es un menú principal / Padre) —</option>
            </select>
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Nombre del Menú *</label>
            <input type="text" name="nombre" placeholder="Ej: Crear Factura o Gestión de Menús" required style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
        </div>

        <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Descripción / Detalles</label>
            <input type="text" name="descripcion" placeholder="Ej: Permite ingresar nuevas ventas al sistema" style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
        </div>

        <div class="form-group" id="wrapperUrlMenu" style="margin-bottom: 15px; display: none;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">URL del Archivo HTML *</label>
            <input type="text" id="txtUrlMenu" name="url" placeholder="Ej: crear_usuario.html" style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
        </div>

        <div class="form-actions">
            <button type="button" id="btnCancelarCrearMenu" class="btn btn-secondary">Limpiar</button>
            <button type="submit" class="btn btn-primary">💾 Guardar Menú</button>
        </div>
    </form>
</div>
