<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="css/producto.css">
</head>
<body class="modulo-body">

<div class="modulo-container" style="max-width: 700px; margin-top: 30px;">

    <form id="formCrearProducto">
        <div class="form-grid" style="grid-template-columns: 1fr 1fr; gap: 15px;">
            
            <!-- Nombre del Producto -->
            <div class="form-group" style="grid-column: span 2;">
                <label for="txtNombre">Nombre del Producto:</label>
                <input type="text" id="txtNombre" name="nombre" class="form-control" required placeholder="Ej. Cable UTP Categoría 6, Monitor 24 pulgadas">
            </div>

            <!-- Descripción -->
            <div class="form-group" style="grid-column: span 2;">
                <label for="txtDescripcion"> Descripción detallada (Opcional):</label>
                <textarea id="txtDescripcion" name="descripcion" class="form-control" rows="2" placeholder="Detalles técnicos, marca o modelo..."></textarea>
            </div>

            <!-- Categoría (Dinámica) -->
            <div class="form-group">
                <label for="selCategoria">🗂️ Categoría:</label>
                <select id="selCategoria" name="id_categoria" class="form-control" required>
                    <option value="" disabled selected>Cargando categorías...</option>
                </select>
            </div>

            <!-- Unidad de Medida -->
            <div class="form-group">
                <label for="txtUnidadMedida">📏 Unidad de Medida:</label>
                <input type="text" id="txtUnidadMedida" name="unidadMedida" class="form-control" required value="UNIDAD" placeholder="Ej. UNIDAD, METRO, CAJA">
            </div>

            <!-- Precio Unitario -->
            <div class="form-group">
                <label for="txtPrecioUnitario">💰 Precio Unitario ($):</label>
                <input type="number" id="txtPrecioUnitario" name="precioUnitario" class="form-control" step="0.0001" min="0.0000" required placeholder="0.0000">
            </div>

            <!-- Stock Inicial -->
            <div class="form-group">
                <label for="txtStockActual">📉 Stock Inicial:</label>
                <input type="number" id="txtStockActual" name="stockActual" class="form-control" step="0.01" min="0.00" value="0.00" required>
            </div>

        </div>

        <div class="form-actions" style="margin-top: 25px;">
            <button type="button" id="btnCancelar" class="btn btn-secondary">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar Producto</button>
        </div>
    </form>
</div>

<script src="js/crear_producto.js"></script>
</body>
</html>
