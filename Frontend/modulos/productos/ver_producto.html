<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Productos</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="css/producto.css">
</head>
<body class="modulo-body">

<div class="modulo-container">
    
    <!-- Encabezado unificado -->
    <header class="modulo-header">
        <div class="header-titles">
            <h1 class="modulo-titulo">Inventario de Productos</h1>
            <p class="modulo-subtitulo">Control general de existencias, precios de venta y categorías</p>
        </div>
    </header>

    <!-- Barra de Controles: Búsqueda y Selector de Paginación -->
    <div class="table-controls">
        <div class="search-box">
            <input type="text" id="inputBuscar" placeholder="🔍 Buscar por ID, nombre o categoría..." autocomplete="off">
        </div>
        <div class="page-size-box">
            <label for="selectPageSize">Mostrar:</label>
            <select id="selectPageSize">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="25">25</option>
                <option value="50">50</option>
            </select>
        </div>
    </div>

    <!-- Contenedor Principal de Tabla -->
    <div class="card table-card">
        <table class="main-table" id="tablaProductos">
            <thead>
                <tr>
                    <th class="col-id">ID</th>
                    <th class="col-producto">Producto</th>
                    <th class="col-categoria">Categoría</th>
                    <th class="col-precio">P. Unitario</th>
                    <th class="col-stock">Stock</th>
                    <th class="col-unidad">U. Medida</th>
                    <th class="col-estado">Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyProductos">
                <tr>
                    <td colspan="7" class="td-empty">
                        Cargando inventario desde el servidor...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Footer de Paginación -->
    <footer class="pagination-container">
        <div class="pagination-info" id="infoPaginacion">
            Mostrando 0 - 0 de 0 productos
        </div>
        <div class="pagination-buttons" id="btnPaginacion">
            <!-- Botones generados dinámicamente -->
        </div>
    </footer>

</div>

<script src="js/ver_producto.js"></script>
</body>
</html>
