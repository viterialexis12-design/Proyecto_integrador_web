<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Cliente</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="css/cliente.css">
</head>
<body class="modulo-body">

<div class="modulo-container">

    <form id="formCrearCliente">
        <div class="form-grid">
            <!-- Sección de Identificación -->
            <div class="form-group">
                <label for="selTipoIdentificacion">Tipo de Identificación:</label>
                <select id="selTipoIdentificacion" name="tipoIdentificacion" class="form-control" required>
                    <option value="" disabled selected>Seleccione una opción...</option>
                    <option value="05">Cédula</option>
                    <option value="04">RUC</option>
                    <option value="06">Pasaporte</option>
                    <option value="07">Consumidor Final</option>
                    <option value="08">Identificación del Exterior</option>
                </select>
            </div>

            <div class="form-group">
                <label for="txtIdentificacion">Número de Identificación:</label>
                <input type="text" id="txtIdentificacion" name="identificacion" class="form-control" required placeholder="Ej. 1712345678">
            </div>

            <!-- Nombres -->
            <div class="form-group">
                <label for="txtNombre1">Primer Nombre:</label>
                <input type="text" id="txtNombre1" name="nombre1" class="form-control" required placeholder="Ej. Juan">
            </div>

            <div class="form-group">
                <label for="txtNombre2">Segundo Nombre (Opcional):</label>
                <input type="text" id="txtNombre2" name="nombre2" class="form-control" placeholder="Ej. Carlos">
            </div>

            <!-- Apellidos -->
            <div class="form-group">
                <label for="txtApellido1">Primer Apellido:</label>
                <input type="text" id="txtApellido1" name="apellido1" class="form-control" required placeholder="Ej. Pérez">
            </div>

            <div class="form-group">
                <label for="txtApellido2">Segundo Apellido (Opcional):</label>
                <input type="text" id="txtApellido2" name="apellido2" class="form-control" placeholder="Ej. Alvear">
            </div>

            <!-- Datos de Contacto -->
            <div class="form-group">
                <label for="txtCorreo">Correo Electrónico:</label>
                <input type="email" id="txtCorreo" name="correo" class="form-control" placeholder="Ej. juan@correo.com">
            </div>

            <div class="form-group">
                <label for="txtTelefono">Teléfono:</label>
                <input type="text" id="txtTelefono" name="telefono" class="form-control" placeholder="Ej. 0998765432">
            </div>

            <div class="form-group" style="grid-column: span 2;">
                <label for="txtDireccion">Dirección Domiciliaria:</label>
                <input type="text" id="txtDireccion" name="direccion" class="form-control" placeholder="Ej. Av. Amazonas y Shyris">
            </div>
        </div>

        <div class="form-actions">
            <button type="button" id="btnCancelar" class="btn btn-secondary">Cancelar</button>
            <button type="submit" class="btn btn-primary">Registrar Cliente</button>
        </div>
    </form>
</div>

<script src="js/crear_clientes.js"></script>
</body>
</html>
