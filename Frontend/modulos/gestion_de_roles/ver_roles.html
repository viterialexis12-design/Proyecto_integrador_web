<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ver Roles</title>
    <!-- Vincula aquí los estilos de tu aplicación -->
    <link rel="stylesheet" href="../../css/global.css"> 
</head>
<body style="background-color: #f9f9f9; margin: 0; padding: 20px; font-family: sans-serif;">

<div class="modulo-container" style="width: 100%; box-sizing: border-box;">
    <div class="modulo-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; width: 100%;">
        <div>
            <h2>🔑 Gestión de Roles y Perfiles</h2>
            <p>Visualiza los niveles de acceso configurados en el sistema.</p>
        </div>
        <button id="btnRefrescarRoles" class="btn btn-secondary">🔄 Actualizar Lista</button>
    </div>

    <div class="table-tools" style="margin: 20px 0; width: 100%;">
        <input type="text" id="txtBuscarRol" placeholder="🔍 Buscar por nombre de rol o descripción..." style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; box-sizing: border-box;">
    </div>

    <div class="table-responsive" style="width: 100%; overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 6px;">
        <table class="main-table" style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem;">
            <thead style="background-color: #2c3e50; color: #ffffff;">
                <tr>
                    <th style="padding: 12px 15px;">Nombre del Rol</th>
                    <th style="padding: 12px 15px;">Descripción</th>
                    <th style="padding: 12px 15px;">Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyRoles">
                <tr>
                    <td colspan="3" style="padding: 20px; text-align: center; color: #7f8c8d;">Cargando registros...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Controles de Paginación -->
    <div id="paginacionRoles" style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding: 10px 0; flex-wrap: wrap; gap: 10px;">
        <div id="infoPaginacionRoles" style="color: #7f8c8d; font-size: 0.9rem;">
            Mostrando 0 a 0 de 0 registros
        </div>
        <div style="display: flex; gap: 5px;" id="botonesPaginacionRoles">
            <!-- Los botones se generarán dinámicamente con JavaScript -->
        </div>
    </div>
</div>

<!-- Enlace al JS Modular -->
<script src="js/ver_rol.js"></script>
</body>
</html>
