<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ver Roles</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/roles.css"> 
</head>
<body class="modulo-body">

<div class="modulo-container">
    <div class="modulo-header">
        <div>
            <h2>🔑 Gestión de Roles y Perfiles</h2>
            <p>Visualiza los niveles de acceso configurados en el sistema.</p>
        </div>
        <button id="btnRefrescarRoles" class="btn btn-secondary">🔄 Actualizar Lista</button>
    </div>

    <!-- Buscador -->
    <div class="table-tools">
        <input type="text" id="txtBuscarRol" placeholder="🔍 Buscar por nombre de rol o descripción...">
    </div>

    <!-- Tabla -->
    <div class="table-responsive">
        <table class="main-table">
            <thead>
                <tr>
                    <th>Nombre del Rol</th>
                    <th>Descripción</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyRoles">
                <tr>
                    <td colspan="3" class="loading-row">Cargando registros...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Controles de Paginación -->
    <div id="paginacionRoles" class="pagination-container">
        <div id="infoPaginacionRoles" class="pagination-info">
            Mostrando 0 a 0 de 0 registros
        </div>
        <div id="botonesPaginacionRoles" class="pagination-buttons">
            <!-- Los botones se generarán dinámicamente con JavaScript -->
        </div>
    </div>
</div>

<!-- Enlace al JS Modular -->
<script src="js/ver_rol.js"></script>
</body>
</html>
