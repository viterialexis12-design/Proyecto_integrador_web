<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actualizar Rol</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/roles.css"> 
</head>
<body class="modulo-body">

<div class="modulo-container ">

    <!-- Buscador de Rol para Editar -->
    <div class="buscador-modulo-container">
        <label for="txtBuscarParaEditarRol">Seleccione el rol a modificar:</label>
        <input type="text" id="txtBuscarParaEditarRol" placeholder="Escribe el nombre del rol...">
        <div id="listaSugerenciasEditarRol" class="lista-sugerencias" style="display: none;"></div>
    </div>

    <!-- Formulario de Edición (Oculto por defecto) -->
    <div id="contenedorFormEditarRol" class="contenedor-confirmacion" style="display: none;">
        <form id="formEditarRol" class="form-grid">
            <input type="hidden" id="txtEditIdRol" name="id">

            <div class="form-group">
                <label for="txtEditRolNombre">Nombre del Rol *</label>
                <input type="text" id="txtEditRolNombre" name="nombre" required>
            </div>

            <div class="form-group">
                <label for="txtEditRolDescripcion">Descripción</label>
                <textarea id="txtEditRolDescripcion" name="descripcion" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="cmbEditRolEstado">Estado</label>
                <select id="cmbEditRolEstado" name="estado">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="button" id="btnCancelarEditarRol" class="btn btn-secondary">Cancelar</button>
                <button type="submit" id="btnGuardarCambiosRol" class="btn btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>

<!-- Enlace al JS Modular -->
<script src="js/actualizar_rol.js"></script>
</body>
</html>
