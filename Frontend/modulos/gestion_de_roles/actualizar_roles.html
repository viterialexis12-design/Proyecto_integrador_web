<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actualizar Rol</title>
    <!-- Vincula aquí los estilos de tu aplicación -->
    <link rel="stylesheet" href="../../css/global.css"> 
</head>
<body style="background-color: #f9f9f9; margin: 0; padding: 20px; font-family: sans-serif;">

<div class="modulo-container" style="width: 100%; box-sizing: border-box;">
    <div class="modulo-header" style="margin-bottom: 25px;">
        <h2 style="color: #2c3e50; margin-bottom: 5px;">✏️ Modificar Rol</h2>
        <p style="color: #7f8c8d; margin-top: 0; font-size: 0.95rem;">Busca un rol por su nombre para cambiar sus detalles.</p>
    </div>

    <div class="buscador-modulo-container" style="position: relative; margin-bottom: 25px; width: 100%;">
        <label for="txtBuscarParaEditarRol" style="font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem; color: #34495e;">Seleccione el rol a modificar:</label>
        <input type="text" id="txtBuscarParaEditarRol" placeholder="🔍 Escribe el nombre del rol..." 
               style="width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem;">
        <div id="listaSugerenciasEditarRol" style="position: absolute; width: 100%; background: white; border: 1px solid #ccc; border-top: none; z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 0 0 4px 4px; box-sizing: border-box;"></div>
    </div>

    <div id="contenedorFormEditarRol" style="display: none; border-top: 2px solid #e2e8f0; padding-top: 20px; width: 100%;">
        <form id="formEditarRol" class="form-grid" style="width: 100%; background: #ffffff; padding: 20px; border-radius: 6px; border: 1px solid #e2e8f0; box-sizing: border-box;">
            <input type="hidden" id="txtEditIdRol" name="id">

            <div class="form-group" style="margin-bottom: 15px;">
                <label for="txtEditRolNombre" style="font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem; color: #34495e;">Nombre del Rol *</label>
                <input type="text" id="txtEditRolNombre" name="nombre" required 
                       style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem;">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label for="txtEditRolDescripcion" style="font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem; color: #34495e;">Descripción</label>
                <textarea id="txtEditRolDescripcion" name="descripcion" rows="3" 
                          style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; resize: none;"></textarea>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label for="cmbEditRolEstado" style="font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem; color: #34495e;">Estado</label>
                <select id="cmbEditRolEstado" name="estado" style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; background: #fff;">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>
            </div>

            <div class="form-actions" style="border-top: 1px solid #eee; padding-top: 15px; display: flex; gap: 10px;">
                <button type="button" id="btnCancelarEditarRol" class="btn btn-secondary">Cancelar</button>
                <button type="submit" id="btnGuardarCambiosRol" class="btn btn-primary">💾 Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>

<!-- Enlace al JS Modular -->
<script src="js/actualizar_rol.js"></script>

</body>
</html>
