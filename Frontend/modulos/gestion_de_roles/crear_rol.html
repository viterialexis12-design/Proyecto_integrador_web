<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Rol</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/roles.css"> 
</head>
<body class="modulo-body">

<div class="modulo-container modulo-container-small">

    <form id="formCrearRol" class="form-grid">
        
        <div class="form-group">
            <label for="txtRolNombre">Nombre del Rol *</label>
            <input type="text" id="txtRolNombre" name="nombre" placeholder="Ej: Supervisor de Inventario" required>
        </div>

        <div class="form-group">
            <label for="txtRolDescripcion">Descripción</label>
            <textarea id="txtRolDescripcion" name="descripcion" placeholder="Describe brevemente qué acciones puede realizar este rol..." rows="3"></textarea>
        </div>

        <div class="form-actions">
            <button type="button" id="btnCancelarCrearRol" class="btn btn-secondary">Limpiar</button>
            <button type="submit" id="btnGuardarRol" class="btn btn-primary">Guardar Rol</button>
        </div>
    </form>
</div>

<!-- Enlace al JS Modular -->
<script src="js/crear_rol.js"></script>
</body>
</html>
