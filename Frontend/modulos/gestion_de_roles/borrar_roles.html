<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Desactivar Rol</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/roles.css"> 
</head>
<body class="modulo-body">

<div class="modulo-container">

    <!-- Buscador Autocompletado -->
    <div class="buscador-modulo-container">
        <label for="txtBuscarParaEliminarRol">Seleccione el rol a dar de baja:</label>
        <input type="text" id="txtBuscarParaEliminarRol" placeholder="Escribe el nombre del rol...">
        <div id="listaSugerenciasEliminarRol" class="lista-sugerencias" style="display: none;"></div>
    </div>

    <!-- Ficha de confirmación (Controlada dinámicamente por tu JS) -->
    <div id="contenedorFichaEliminarRol" class="contenedor-confirmacion" style="display: none;">
        <div id="boxFichaRol" class="confirm-box">
            <p><b>ID Rol:</b> <span id="lblDelIdRol">-</span></p>
            <p><b>Nombre del Rol:</b> <span id="lblDelRolNombre">-</span></p>
            <p><b>Descripción:</b> <span id="lblDelRolDesc">-</span></p>
            <p><b>Estado Actual:</b> <span id="lblDelRolEstado">-</span></p>
            
            <div id="msgProtegidoRol" class="alerta-protegida" style="display: none;">
                Este es un rol crítico del sistema (Super Administrador) y no puede ser desactivado.
            </div>
        </div>

        <div class="form-actions-simple">
            <button type="button" id="btnCancelarEliminarRol" class="btn btn-secondary">Cancelar</button>
            <button type="button" id="btnConfirmarEliminarRol" class="btn btn-danger-action">Confirmar Inactivación</button>
        </div>
    </div>
</div>

<!-- Enlace al JS Modular -->
<script src="js/borrar_rol.js"></script>
</body>
</html>
