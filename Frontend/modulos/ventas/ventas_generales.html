<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ventas Generales</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="css/venta.css">
</head>
<body class="modulo-body">

<div class="modulo-container">

    <!-- Barra de Filtros y Búsqueda -->
    <div class="filter-bar card">
        <div class="filter-group flex-1">
            <label for="buscarClienteG">Buscar Cliente / Factura / Vendedor</label>
            <input type="text" id="buscarClienteG" placeholder=" Nombre, RUC/Cédula, cajero..." autocomplete="off">
        </div>
        
        <div class="filter-group">
            <label for="fechaDesdeG">Desde</label>
            <input type="date" id="fechaDesdeG">
        </div>
        
        <div class="filter-group">
            <label for="fechaHastaG">Hasta</label>
            <input type="date" id="fechaHastaG">
        </div>

        <div class="filter-actions">
            <button class="btn btn-primary" id="btnFiltrarG">Filtrar</button>
            <button class="btn btn-secondary" id="btnLimpiarG">Limpiar</button>
        </div>
    </div>

    <!-- Barra de Controles: Selector de Registros -->
    <div class="table-controls">
        <div class="page-size-box ml-auto">
            <label for="selectPageSize">Mostrar:</label>
            <select id="selectPageSize">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="25">25</option>
                <option value="50">50</option>
            </select>
        </div>
    </div>

    <!-- Contenedor Principal de Tabla -->
    <div class="card table-card">
        <table class="main-table" id="tablaVentasGenerales">
            <thead>
                <tr>
                    <th class="col-factura">No. Factura</th>
                    <th class="col-fecha">Fecha Emisión</th>
                    <th style="width: 15%;">Punto Emisión</th>
                    <th style="width: 18%;">Vendedor / Cajero</th>
                    <th class="col-cliente">Cliente</th>
                    <th class="col-total">Total</th>
                    <th class="col-acciones">Acciones</th>
                </tr>
            </thead>
            <tbody id="tbodyVentasGenerales">
                <tr>
                    <td colspan="7" class="td-empty">
                        Cargando el historial global de ventas...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Footer de Paginación -->
    <footer class="pagination-container">
        <div class="pagination-info" id="infoPaginacion">
            Mostrando 0 - 0 de 0 ventas
        </div>
        <div class="pagination-buttons" id="btnPaginacion">
            <!-- Botones generados dinámicamente -->
        </div>
    </footer>

</div>

<script src="js/ventas_generales.js"></script>
</body>
</html>
