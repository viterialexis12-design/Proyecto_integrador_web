<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Usuarios</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/usuarios.css"> 
</head>
<body>

<div class="modulo-container">
    <!-- Encabezado unificado -->
    <div class="modulo-header">
        <div class="modulo-header-title">
            <h2>👥 Gestión de Usuarios</h2>
            <p>Visualiza, busca y administra el personal registrado en la plataforma.</p>
        </div>
        <button id="btnRefrescarUsuarios" class="btn btn-secondary">🔄 Actualizar Lista</button>
    </div>

    <!-- Nueva Barra de Herramientas Estilizada siguiendo el patrón de menús -->
    <div class="table-tools">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="txtBuscarUsuario" class="search-input" placeholder="Buscar por nombre, apellido, cédula o usuario...">
        </div>
        <!-- Nota: Tu JS actual no maneja el select dinámico de límites, pero lo dejamos maquetado estructuralmente con la clase de menús para mantener la simetría visual -->
        <div class="limit-selector-wrapper">
            <label for="selectLimitesUsuarios">Mostrar</label>
            <select id="selectLimitesUsuarios" class="limit-select" disabled>
                <option value="10" selected>10 filas</option>
            </select>
        </div>
    </div>

    <!-- Contenedor de la Tabla -->
    <div class="table-responsive">
        <table id="tablaUsuarios" class="main-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre Completo</th>
                    <th>Cédula</th>
                    <th>Correo</th>
                    <th>Username</th>
                    <th>Rol</th>
                    <th class="status-header">Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyUsuarios">
                <tr>
                    <td colspan="7" class="loading-row">Cargando registros...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Paginación Unificada siguiendo el patrón de menús -->
    <div id="paginacionUsuarios" class="pagination-container">
        <span id="infoPaginacionUsuarios" class="pagination-info">Mostrando 0 a 0 de 0 registros</span>
        <div class="pagination-buttons">
            <button id="btnPrevUsuarios" class="btn-pag-nav">◀ Anterior</button>
            <div id="contenedorPaginasUsuarios" class="pagination-numbers"></div>
            <button id="btnNextUsuarios" class="btn-pag-nav">Siguiente ▶</button>
        </div>
    </div>
</div>

<!-- Enlace al JS Modular intacto -->
<script src="js/ver_usuario.js"></script>
</body>
</html>
