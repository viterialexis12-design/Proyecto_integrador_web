<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Usuarios</title>
    <link rel="stylesheet" href="../../css/global.css"> 
</head>
<body class="modulo-body">

<div class="modulo-container">

    <!-- Barra de Herramientas y Filtros -->
    <div class="filter-bar card">
        <div class="filter-group flex-1">
            <label for="txtBuscarUsuario">Buscar Usuario</label>
            <input type="text" id="txtBuscarUsuario" placeholder="Buscar por nombre, apellido, cédula, correo o usuario..." autocomplete="off">
        </div>
        <div class="filter-group">
            <label for="selectLimitesUsuarios">Mostrar</label>
            <select id="selectLimitesUsuarios">
                <option value="5">5 filas</option>
                <option value="10" selected>10 filas</option>
                <option value="25">25 filas</option>
                <option value="50">50 filas</option>
                <option value="todos">Todas</option>
            </select>
        </div>
    </div>

    <!-- Contenedor Principal de Tabla -->
    <div class="card table-card">
        <table id="tablaUsuarios" class="main-table">
            <thead>
                <tr>
                    <th style="width: 25%;">Nombre Completo</th>
                    <th style="width: 14%;">Cédula</th>
                    <th style="width: 23%;">Correo</th>
                    <th style="width: 12%;">Username</th>
                    <th style="width: 10%;">Rol</th>
                    <th style="width: 8%; text-align: center;">Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyUsuarios">
                <tr>
                    <td colspan="7" class="td-empty">Cargando usuarios...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Footer de Paginación Unificado -->
    <footer id="paginacionUsuarios" class="pagination-container">
        <div id="infoPaginacionUsuarios" class="pagination-info">
            Mostrando 0 a 0 de 0 registros
        </div>
        <div class="pagination-buttons">
            <button id="btnPrevUsuarios" class="page-btn" disabled>◀</button>
            <div id="contenedorPaginasUsuarios" class="pagination-numbers-box"></div>
            <button id="btnNextUsuarios" class="page-btn" disabled>▶</button>
        </div>
    </footer>

</div>

<!-- Enlace al JS Modular -->
<script src="js/ver_usuario.js"></script>
</body>
</html>
