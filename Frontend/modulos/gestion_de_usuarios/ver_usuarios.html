<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ver usuarios</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/usuarios.css"> 
</head>
<body class="modulo-body">

<div class="modulo-container">
    <div class="modulo-header">
        <div>
            <h2>👥 Gestión de Usuarios</h2>
            <p>Visualiza, busca y administra el personal registrado en la plataforma.</p>
        </div>
        <button id="btnRefrescarUsuarios" class="btn btn-secondary">🔄 Actualizar Lista</button>
    </div>

    <!-- Buscador -->
    <div class="table-tools">
        <input type="text" id="txtBuscarUsuario" placeholder="🔍 Buscar por nombre, apellido, cédula o usuario...">
    </div>

    <!-- Tabla -->
    <div class="table-responsive">
        <table id="tablaUsuarios" class="main-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre Completo</th>
                    <th>Cédula</th>
                    <th>Correo</th>
                    <th>Username</th>
                    <th>Rol</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyUsuarios">
                <tr>
                    <td colspan="7" class="loading-row">Cargando registros...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Controles de Paginación -->
    <div id="paginacionUsuarios" class="pagination-container">
        <span id="infoPaginacionUsuarios" class="pagination-info">Mostrando 0 a 0 de 0 registros</span>
        <div class="pagination-buttons">
            <button id="btnPrevUsuarios" class="btn btn-secondary btn-pag-nav">◀ Anterior</button>
            <div id="contenedorPaginasUsuarios" class="pagination-pages"></div>
            <button id="btnNextUsuarios" class="btn btn-secondary btn-pag-nav">Siguiente ▶</button>
        </div>
    </div>
</div>

<!-- Enlace al JS Modular -->
<script src="js/ver_usuario.js"></script>
</body>
</html>
