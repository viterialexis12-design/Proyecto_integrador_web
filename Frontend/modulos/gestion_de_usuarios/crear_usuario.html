<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear usuario</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/usuarios.css"> 
</head>
<body class="modulo-body">

<div class="modulo-container">
    
    <form id="formCrearUsuario" autocomplete="off" class="form-grid">
        
        <div class="form-section-title">Datos Personales</div>
        
        <div class="form-group">
            <label for="txtNombre1">Primer Nombre *</label>
            <input type="text" id="txtNombre1" name="nombre1" required placeholder="Ej. Juan">
        </div>

        <div class="form-group">
            <label for="txtNombre2">Segundo Nombre</label>
            <input type="text" id="txtNombre2" name="nombre2" placeholder="Ej. Carlos">
        </div>

        <div class="form-group">
            <label for="txtApellido1">Primer Apellido *</label>
            <input type="text" id="txtApellido1" name="apellido1" required placeholder="Ej. Pérez">
        </div>

        <div class="form-group">
            <label for="txtApellido2">Segundo Apellido</label>
            <input type="text" id="txtApellido2" name="apellido2" placeholder="Ej. López">
        </div>

        <div class="form-group">
            <label for="txtCedula">Cédula / Identificación *</label>
            <input type="text" id="txtCedula" name="cedula" required maxlength="10" placeholder="Ej. 1712345678">
            <span id="errorCedula" class="error-validacion">Cédula inválida. Debe contener 10 dígitos y pasar el algoritmo de validación.</span>
        </div>

        <div class="form-group">
            <label for="txtFechaNac">Fecha de Nacimiento *</label>
            <input type="date" id="txtFechaNac" name="fecha_nacimiento" required>
        </div>

        <div class="form-group">
            <label for="txtTelefono">Teléfono</label>
            <input type="tel" id="txtTelefono" name="telefono" placeholder="Ej. 0998765432">
        </div>

        <div class="form-group">
            <label for="txtCorreo">Correo Electrónico *</label>
            <input type="email" id="txtCorreo" name="correo" required placeholder="juan.perez@correo.com">
        </div>

        <div class="form-section-title span-all-columns">Credenciales de Acceso</div>

        <div class="form-group">
            <label for="txtUsername">Nombre de Usuario (Username) *</label>
            <input type="text" id="txtUsername" name="username" required placeholder="Ej. jperez">
        </div>

        <div class="form-group">
            <label for="txtClave">Contraseña *</label>
            <input type="password" id="txtClave" name="clave" required autocomplete="new-password" placeholder="••••••••">
        </div>

        <div class="form-group">
            <label for="cmbRol">Rol Asignado *</label>
            <select id="cmbRol" name="id_rol" required>
                <option value="">-- Seleccione un Rol --</option>
            </select>
        </div>

        <div class="form-group">
            <label for="cmbEstado">Estado Inicial</label>
            <select id="cmbEstado" name="estado">
                <option value="1" selected>Activo</option>
                <option value="0">Inactivo</option>
            </select>
        </div>

        <div class="form-actions span-all-columns">
            <button type="button" id="btnCancelarUsuario" class="btn btn-secondary">Cancelar</button>
            <button type="submit" id="btnGuardarUsuario" class="btn btn-primary">Guardar Usuario</button>
        </div>
    </form>
</div>

<!-- Enlace al JS Modular -->
<script src="js/crear_usuario.js"></script>
</body>
</html>
