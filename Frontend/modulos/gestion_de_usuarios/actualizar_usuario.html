<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actualizar usuario</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/usuarios.css"> 
</head>
<body class="modulo-body">

<div class="modulo-container">
    <!-- Buscador de Usuario -->
    <div class="buscador-modulo-container">
        <label for="txtBuscarParaEditar">Seleccione el usuario a modificar:</label>
        <input type="text" id="txtBuscarParaEditar" placeholder="Escribe cédula, nombre o username...">
        <div id="listaSugerenciasEditar" class="lista-sugerencias"></div>
    </div>

    <!-- Formulario de Edición (Oculto por defecto) -->
    <div id="contenedorFormEditar" class="contenedor-confirmacion">
        <form id="formEditarUsuario" autocomplete="off" class="form-grid">
            <input type="hidden" id="txtEditIdUsuario" name="id">

            <div class="form-section-title">Datos Personales</div>
            
            <div class="form-group">
                <label for="txtEditNombre1">Primer Nombre *</label>
                <input type="text" id="txtEditNombre1" name="nombre1" required>
            </div>
            <div class="form-group">
                <label for="txtEditNombre2">Segundo Nombre</label>
                <input type="text" id="txtEditNombre2" name="nombre2">
            </div>
            <div class="form-group">
                <label for="txtEditApellido1">Primer Apellido *</label>
                <input type="text" id="txtEditApellido1" name="apellido1" required>
            </div>
            <div class="form-group">
                <label for="txtEditApellido2">Segundo Apellido</label>
                <input type="text" id="txtEditApellido2" name="apellido2">
            </div>
            <div class="form-group">
                <label for="txtEditCedula">Cédula *</label>
                <input type="text" id="txtEditCedula" name="cedula" required maxlength="10">
                <span id="errorEditCedula" class="error-validacion">Cédula inválida. Debe contener 10 dígitos y pasar el algoritmo de validación.</span>
            </div>
            <div class="form-group">
                <label for="txtEditFechaNac">Fecha de Nacimiento *</label>
                <input type="date" id="txtEditFechaNac" name="fecha_nacimiento" required>
            </div>
            <div class="form-group">
                <label for="txtEditTelefono">Teléfono</label>
                <input type="tel" id="txtEditTelefono" name="telefono">
            </div>
            <div class="form-group">
                <label for="txtEditCorreo">Correo *</label>
                <input type="email" id="txtEditCorreo" name="correo" required>
            </div>

            <div class="form-section-title span-all-columns">Credenciales de Acceso</div>
            
            <div class="form-group">
                <label for="txtEditUsername">Username *</label>
                <input type="text" id="txtEditUsername" name="username" required>
            </div>
            <div class="form-group">
                <label for="txtEditClave">Nueva Contraseña <span class="label-optional">(Opcional)</span></label>
                <input type="password" id="txtEditClave" name="clave" autocomplete="new-password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label for="cmbEditRol">Rol *</label>
                <select id="cmbEditRol" name="id_rol" required>
                    <option value="">-- Seleccione un Rol --</option>
                </select>
            </div>
            <div class="form-group">
                <label for="cmbEditEstado">Estado</label>
                <select id="cmbEditEstado" name="estado">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>
            </div>

            <div class="form-actions span-all-columns">
                <button type="button" id="btnCancelarEditarUsuario" class="btn btn-secondary">Limpiar / Cancelar</button>
                <button type="submit" id="btnGuardarEditarUsuario" class="btn btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>

<!-- Enlace al JS Modular -->
<script src="js/actualizar_usuario.js"></script>
</body>
</html>
