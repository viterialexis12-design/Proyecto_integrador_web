<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Categorías</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="css/categoria.css">
</head>
<body class="modulo-body">

<div class="modulo-container">


    <!-- Barra de Búsqueda -->
    <div class="filter-bar card">
        <div class="filter-group flex-1">
            <label for="inputBuscarCategoria">Buscar Categoría</label>
            <input type="text" id="inputBuscarCategoria" placeholder="Buscar por Nombre, Descripción o IVA SRI..." autocomplete="off">
        </div>
        <div class="filter-actions">
            <button class="btn btn-secondary" id="btnLimpiarCategoria"> Limpiar</button>
        </div>
    </div>

    <!-- Barra de Controles: Selector de Registros -->
    <div class="table-controls">
        <div class="page-size-box ml-auto">
            <label for="selectPageSize">Mostrar:</label>
            <select id="selectPageSize">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="25">25</option>
                <option value="50">50</option>
            </select>
        </div>
    </div>

    <!-- Contenedor Principal de Tabla -->
    <div class="card table-card">
        <table class="main-table" id="tablaCategorias">
            <thead>
                <tr>
                    <th style="width: 10%;">ID</th>
                    <th style="width: 30%;">Nombre de Categoría</th>
                    <th style="width: 40%;">Descripción</th>
                    <th style="width: 10%;">ID IVA SRI</th>
                    <th style="width: 10%; text-align: center;">Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyCategorias">
                <tr>
                    <td colspan="5" class="td-empty">
                         Cargando categorías desde el servidor...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Footer de Paginación -->
    <footer class="pagination-container">
        <div class="pagination-info" id="infoPaginacion">
            Mostrando 0 - 0 de 0 categorías
        </div>
        <div class="pagination-buttons" id="btnPaginacion">
            <!-- Botones generados dinámicamente -->
        </div>
    </footer>

</div>

<script src="js/ver_categorias.js"></script>
</body>
</html>
