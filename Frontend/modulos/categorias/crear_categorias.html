<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Categoría</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="css/categoria.css">
</head>
<body class="modulo-body">

<div class="modulo-container" style="max-width: 600px; margin-top: 30px;">
    <div class="modulo-header">
        <div>
            <h2>➕ Registrar Nueva Categoría</h2>
            <p>Define una nueva agrupación para clasificar los productos y asigna su impuesto base.</p>
        </div>
    </div>

    <form id="formCrearCategoria">
        <div class="form-grid" style="grid-template-columns: 1fr;">
            
            <!-- Nombre de Categoría -->
            <div class="form-group">
                <label for="txtNombre">🏷️ Nombre de la Categoría:</label>
                <input type="text" id="txtNombre" name="nombre" class="form-control" required placeholder="Ej. Lácteos, Electrónicos, Repuestos">
            </div>

            <!-- Descripción -->
            <div class="form-group">
                <label for="txtDescripcion">📝 Descripción / Notas (Opcional):</label>
                <textarea id="txtDescripcion" name="descripcion" class="form-control" rows="3" placeholder="Breve detalle sobre el uso de esta categoría..."></textarea>
            </div>

            <!-- Código IVA SRI -->
            <div class="form-group">
                <label for="selIvaSRI">📊 Tipo de Impuesto IVA (Tarifa SRI):</label>
                <select id="selIvaSRI" name="id_ivaSRI" class="form-control" required>
                    <option value="" disabled selected>Seleccione la tarifa impositiva...</option>
                    <option value="2">Con IVA (Tarifa General)</option>
                    <option value="0">Tarifa 0%</option>
                    <option value="6">No Objeto de Impuesto</option>
                    <option value="7">Exento de IVA</option>
                </select>
                <small style="color: #64748b; margin-top: 4px; display: block;">
                    * Este código vincula automáticamente los productos asociados a la normativa del SRI.
                </small>
            </div>

        </div>

        <div class="form-actions" style="margin-top: 25px;">
            <button type="button" id="btnCancelar" class="btn btn-secondary">Cancelar</button>
            <button type="submit" class="btn btn-primary">💾 Guardar Categoría</button>
        </div>
    </form>
</div>

<script src="js/crear_categorias.js"></script>
</body>
</html>
