<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inactivar Categoría</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="css/categoria.css">
</head>
<body class="modulo-body">

<div class="modulo-container" style="max-width: 650px; margin-top: 30px;">

    <!-- Buscador de Categorías -->
    <div class="buscador-modulo-container" style="margin-top: 20px; position: relative;">
        <label for="txtBuscarParaEliminarCategoria" style="font-weight: 600; font-size: 0.85rem; color: #475569; display: block; margin-bottom: 6px;">
            Seleccione la categoría a dar de baja:
        </label>
        <input type="text" id="txtBuscarParaEliminarCategoria" class="form-control" placeholder="Escribe el nombre o descripción de la categoría...">
        <div id="listaSugerenciasEliminarCategoria" class="lista-sugerencias" style="display: none; background: #fff; border: 1px solid #cbd5e1; border-radius: 6px; margin-top: 4px; max-height: 200px; overflow-y: auto; position: absolute; z-index: 1000; width: 100%; box-sizing: border-box;"></div>
    </div>

    <!-- Ficha de Confirmación (Oculta por defecto) -->
    <div id="contenedorFichaEliminarCategoria" class="contenedor-confirmacion" style="display: none; margin-top: 20px; padding: 20px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
        <div class="confirm-box" style="display: flex; flex-direction: column; gap: 8px; font-size: 0.9rem; color: #334155;">
            <p style="margin: 0;"><b>Categoría:</b> <span id="lblDelCategoriaNombre">-</span></p>
            <p style="margin: 0;"><b>Descripción:</b> <span id="lblDelCategoriaDescripcion" style="color: #64748b;">-</span></p>
            <p style="margin: 0;"><b>Estado Actual:</b> <span id="lblDelCategoriaEstado">-</span></p>

            <div id="alertaCategoriaEstado" class="alerta-dinamica" style="display: none; margin-top: 10px; padding: 10px; border-left: 4px solid #0284c7; background-color: #e0f2fe; color: #075985; border-radius: 4px; font-size: 0.85rem;">
                <!-- Mensaje inyectado dinámicamente si aplica -->
            </div>
        </div>

        <!-- Acciones de Control -->
        <div class="form-actions-simple" style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 15px; border-top: 1px solid #e2e8f0;">
            <button type="button" id="btnCancelarEliminarCategoria" class="btn btn-secondary">Cancelar</button>
            <button type="button" id="btnConfirmarEliminarCategoria" class="btn" style="background-color: #dc2626; color: white;">Confirmar Inactivación</button>
        </div>
    </div>
</div>

<script src="js/borrar_categorias.js"></script>
</body>
</html>
