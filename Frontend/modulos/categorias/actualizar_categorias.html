<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modificar Categoría</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="css/categoria.css">
</head>
<body class="modulo-body">

<div class="modulo-container">

    <!-- Buscador Autocompletado -->
    <div class="buscador-modulo-container">
        <label for="txtBuscarParaEditarCategoria">Seleccione la categoría a modificar:</label>
        <input type="text" id="txtBuscarParaEditarCategoria" placeholder="Escribe el nombre de la categoría...">
        <div id="listaSugerenciasEditarCategoria" class="lista-sugerencias" style="display: none;"></div>
    </div>

    <!-- Formulario de Edición (Oculto hasta seleccionar) -->
    <div id="contenedorFormEditarCategoria" class="contenedor-confirmacion" style="display: none;">
        <form id="formEditarCategoria">
            <!-- ID oculto para la referencia de actualización -->
            <input type="hidden" id="txtIdCategoria" name="id">

            <div class="form-grid" style="grid-template-columns: 1fr;">
                
                <!-- Nombre de Categoría -->
                <div class="form-group">
                    <label for="txtNombre">Nombre de la Categoría *</label>
                    <input type="text" id="txtNombre" name="nombre" class="form-control" required>
                </div>

                <!-- Descripción -->
                <div class="form-group">
                    <label for="txtDescripcion"> Descripción / Notas (Opcional):</label>
                    <textarea id="txtDescripcion" name="descripcion" class="form-control" rows="3"></textarea>
                </div>

                <!-- Código IVA SRI -->
                <div class="form-group">
                    <label for="selIvaSRI">Tipo de Impuesto IVA (Tarifa SRI) *</label>
                    <select id="selIvaSRI" name="id_ivaSRI" class="form-control" required>
                        <option value="2">Con IVA (Tarifa General)</option>
                        <option value="0">Tarifa 0%</option>
                        <option value="6">No Objeto de Impuesto</option>
                        <option value="7">Exento de IVA</option>
                    </select>
                </div>

                <!-- Estado de la Categoría -->
                <div class="form-group">
                    <label for="selEstado">Estado Operativo *</label>
                    <select id="selEstado" name="estado" class="form-control" required>
                        <option value="1">Activo</option>
                        <option value="0">Inactivo</option>
                    </select>
                </div>

            </div>

            <div class="form-actions" style="margin-top: 25px;">
                <button type="button" id="btnCancelar" class="btn btn-secondary">Cancelar</button>
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>

<script src="js/actualizar_categorias.js"></script>
</body>
</html>
