<div class="dashboard-container">
    <!-- Sidebar / Menú Lateral -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>MENU</h3>
        </div>
        
        <nav class="sidebar-menu" id="menuDinamico">
            <!-- Los menús y submenús dinámicos se inyectarán aquí -->
        </nav>
    </aside>

    <!-- Área Principal -->
    <main class="dashboard-content">
        <!-- Barra Superior Unificada -->
        <header class="content-header">
            <div class="header-left">
                <button id="btnToggleSidebar" class="btn-toggle" title="Contraer/Expandir menú">
                    ☰
                </button>
                <h2 id="seccionActualTitle">Panel de Control General</h2>
            </div>
            
            <!-- Perfil en la parte derecha con Menú Desplegable -->
            <div class="user-profile-wrapper" id="userProfileWrapper">
                <div class="user-profile-top" id="btnToggleProfileMenu">
                    <img src="Frontend/img/Foto_perfil.png" alt="Perfil" class="avatar-menu-top" id="dashFotoUsuario">
                    <div class="user-info-top">
                        <h4 id="dashNombreUsuario">Cargando...</h4>
                        <span class="role-badge" id="dashRolUsuario">Rol</span>
                    </div>
                </div>

                <!-- Dropdown Oculto -->
                <div class="profile-dropdown" id="profileDropdown">
                    <button id="btnCerrarSesion" class="dropdown-item btn-logout">
                        Salir
                    </button>
                </div>
            </div>
        </header>

        <!-- Contenido Central -->
        <section class="content-body">
            <iframe 
                id="moduloIframe" 
                name="moduloIframe"
                src="about:blank" 
                title="Contenedor de Módulo">
            </iframe>
        </section>
    </main>

    <!-- Template de Bienvenida -->
    <template id="Carta_bienvenida">
        <div class="bienvenido-container">
            <div class="bienvenido-card">
                <h1>Bienvenido</h1>
                <p class="bienvenido-text">Selecciona una opción del menú para comenzar</p>
                <div class="divider"></div>
                <p class="bienvenido-footer">Panel de Control General</p>
            </div>
        </div>
    </template>
</div>
