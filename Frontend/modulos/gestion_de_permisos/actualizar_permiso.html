<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actualizar permiso</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/permisos.css"> 
</head>
<body class="modulo-body">

<div class="modulo-container">

    <!-- Buscador de Rol -->
    <div class="control-group">
        <label for="txtBuscarRolPermiso">Escriba el nombre del Rol a Consultar:</label>
        <input type="text" id="txtBuscarRolPermiso" placeholder="Escribe para buscar un rol... (Ej: SA, Administrador)" autocomplete="off">
        <div id="listaSugerenciasRol" class="lista-sugerencias" style="display: none;"></div>
    </div>

    <!-- Formulario de la Matriz (Controlado por tu JS) -->
    <form id="formMatrizPermisos" style="display: none;">
        <input type="hidden" id="txtRolSeleccionadoId" name="id_rol">
        
        <h3 class="section-title">
            Configuración de Accesos Jerárquicos
        </h3>
        
        <!-- Grid de Tarjetas de Módulos -->
        <div id="listaModulosEdicion" class="grid-tarjetas">
        </div>

        <!-- Contenedor de la Paginación Dinámica para Edición -->
        <div id="paginacionEdicionPermisos" class="paginacion-dinamica">
        </div>

        <!-- Acciones del Formulario -->
        <div class="form-actions">
            <button type="button" id="btnCancelarMatriz" class="btn btn-secondary">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar Matriz de Permisos</button>
        </div>
    </form>
</div>

<!-- Enlace al JS Modular -->
<script src="js/actualizar_permiso.js"></script>
</body>
</html>
