<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Menús</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/menus.css"> 
</head>
<body>

<div class="modulo-container">
    <!-- Encabezado unificado -->
    <div class="modulo-header">
        <div class="modulo-header-title">
            <h2>📁 Módulos y Menús del Sistema</h2>
            <p>Lista de secciones principales accesibles en la barra lateral (Sidebar) organizadas por jerarquía.</p>
        </div>
        <button id="btnRefrescarMenus" class="btn btn-secondary">🔄 Actualizar</button>
    </div>

    <!-- Nueva Barra de Herramientas Estilizada -->
    <div class="table-tools">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="txtBuscarMenu" class="search-input" placeholder="Filtrar por nombre, descripción o padre...">
        </div>
        <div class="limit-selector-wrapper">
            <label for="selectLimites">Mostrar</label>
            <select id="selectLimites" class="limit-select">
                <option value="5" selected>5 filas</option>
                <option value="10">10 filas</option>
                <option value="20">20 filas</option>
                <option value="todos">Todos</option>
            </select>
        </div>
    </div>

    <!-- Contenedor de la Tabla -->
    <div class="table-responsive">
        <table class="main-table">
            <thead>
                <tr>
                    <th>Nombre del Menú</th>
                    <th>Descripción</th>
                    <th>Menú Padre</th>
                    <th class="status-header">Estado</th>
                </tr>
            </thead>
            <tbody id="tbodyMenus">
                <tr>
                    <td colspan="4" class="loading-row">Cargando menús...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Paginación Unificada -->
    <div class="pagination-container">
        <span id="infoPaginacion" class="pagination-info">Mostrando 0 a 0 de 0 registros</span>
        <div class="pagination-buttons">
            <button id="btnPrevPage" class="btn-pag-nav" disabled>◀ Anterior</button>
            <div id="contenedorNumerosPagina" class="pagination-numbers"></div>
            <button id="btnNextPage" class="btn-pag-nav" disabled>Siguiente ▶</button>
        </div>
    </div>
</div>

<script src="js/ver_menu.js"></script>
</body>
</html>
