<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modificar Menú</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/menus.css"> 
</head>
<body class="modulo-body">

<div class="modulo-container">

    <!-- Buscador Autocompletado -->
    <div class="buscador-modulo-container">
        <label>Seleccione el menú a modificar:</label>
        <input type="text" id="txtBuscarParaEditarMenu" placeholder="Escribe el nombre del menú...">
        <div id="listaSugerenciasEditarMenu" class="lista-sugerencias" style="display: none;"></div>
    </div>

    <!-- Formulario de Edición (Oculto hasta seleccionar) -->
    <div id="contenedorFormEditarMenu" class="contenedor-confirmacion" style="display: none;">
        <form id="formEditarMenu" class="form-grid">
            <input type="hidden" id="txtEditIdMenu" name="id">

            <div class="form-group">
                <label>Menú Padre</label>
                <select id="cmbEditMenuPadre" name="id_menuPadre">
                    <option value="">— Ninguno (Es un menú principal / Padre) —</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nombre del Menú *</label>
                <input type="text" id="txtEditMenuNombre" name="nombre" required>
            </div>

            <div class="form-group">
                <label>Descripción / Detalles del Menú</label>
                <input type="text" id="txtEditMenuDescripcion" name="descripcion" placeholder="Ej: Acceso a reportes del sistema">
            </div>

            <div class="form-group" id="wrapperEditUrlMenu" style="display: none;">
                <label>URL del Archivo HTML *</label>
                <input type="text" id="txtEditMenuUrl" name="url" placeholder="Ej: actualizar_usuario.html">
            </div>

            <div class="form-group">
                <label>Estado del Módulo:</label>
                <select id="txtUpdateEstadoMenu" name="estado">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>

                <div id="alertaHijosUpdateMenu" class="alerta-hijos-danger" style="display: none;">
                    ¡Atención! Si cambias el estado a 'Inactivo', todos los submenús dependientes de este módulo principal también se desactivarán en cascada.
                </div>
            </div>

            <div class="form-actions">
                <button type="button" id="btnCancelarEditarMenu" class="btn btn-secondary">Cancelar</button>
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>

<!-- Enlace al JS Modular -->
<script src="js/actualizar_menu.js"></script>
</body>
</html>
