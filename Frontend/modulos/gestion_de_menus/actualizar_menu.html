<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modificar Menú</title>
    <!-- Vincula aquí los estilos de tu aplicación -->
    <link rel="stylesheet" href="../../css/global.css"> 
</head>
<body style="background-color: #f9f9f9; margin: 0; padding: 20px; font-family: sans-serif;">

<div class="modulo-container" style="width: 100%; max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
    <div class="modulo-header" style="margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
        <h2 style="margin: 0; color: #2c3e50;">✏️ Modificar Módulo o Menú</h2>
        <p style="margin: 5px 0 0 0; color: #7f8c8d; font-size: 0.9rem;">Busca un menú para actualizar sus propiedades visuales, jerarquía o estado.</p>
    </div>

    <!-- Buscador Autocompletado -->
    <div class="buscador-modulo-container" style="position: relative; margin-bottom: 25px; width: 100%;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #34495e;">Seleccione el menú a modificar:</label>
        <input type="text" id="txtBuscarParaEditarMenu" placeholder="🔍 Escribe el nombre del menú..."
            style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        <div id="listaSugerenciasEditarMenu"
            style="position: absolute; width: 100%; background: white; border: 1px solid #ccc; border-top: none; z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box;">
        </div>
    </div>

    <!-- Formulario de Edición (Oculto hasta seleccionar) -->
    <div id="contenedorFormEditarMenu" style="display: none; border-top: 2px solid #e2e8f0; padding-top: 20px; width: 100%;">
        <form id="formEditarMenu" class="form-grid" style="width: 100%;">
            <input type="hidden" id="txtEditIdMenu" name="id">

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #34495e;">Menú Padre</label>
                <select id="cmbEditMenuPadre" name="id_menuPadre"
                    style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background-color: #fff;">
                    <option value="">— Ninguno (Es un menú principal / Padre) —</option>
                </select>
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #34495e;">Nombre del Menú *</label>
                <input type="text" id="txtEditMenuNombre" name="nombre" required
                    style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #34495e;">Descripción / Detalles del Menú</label>
                <input type="text" id="txtEditMenuDescripcion" name="descripcion" placeholder="Ej: Acceso a reportes del sistema"
                    style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <div class="form-group" id="wrapperEditUrlMenu" style="margin-bottom: 15px; display: none;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #34495e;">URL del Archivo HTML *</label>
                <input type="text" id="txtEditMenuUrl" name="url" placeholder="Ej: actualizar_usuario.html"
                    style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #34495e;">Estado del Módulo:</label>
                <!-- Se ha añadido name="estado" para captura automática en el FormData -->
                <select id="txtUpdateEstadoMenu" name="estado"
                    style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background-color: #fff;">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>

                <div id="alertaHijosUpdateMenu"
                    style="display: none; margin-top: 10px; padding: 12px; background-color: #f8d7da; border-left: 5px solid #dc3545; color: #721c24; font-weight: bold; border-radius: 4px; font-size: 0.85rem; box-sizing: border-box;">
                    ⚠️ ¡Atención! Si cambias el estado a 'Inactivo', todos los submenús dependientes de este módulo principal también se desactivarán en cascada.
                </div>
            </div>

            <div class="form-actions" style="display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid #eee; padding-top: 15px;">
                <button type="button" id="btnCancelarEditarMenu" class="btn btn-secondary" style="padding: 10px 20px; cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 4px;">Cancelar</button>
                <button type="submit" class="btn btn-primary" style="padding: 10px 20px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 4px; font-weight: bold;">💾 Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>

<!-- Enlace al JS Modular -->
<script src="js/actualizar_menu.js"></script>
</body>
</html>
