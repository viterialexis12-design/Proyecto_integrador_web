<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modificar Menú</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/menus.css"> 
</head>
<body class="modulo-body">
<div class="modulo-container">
    <!-- Buscador de menús para dar de baja -->
    <div class="buscador-modulo-container">
        <label>Seleccione el menú a dar de baja:</label>
        <input type="text" id="txtBuscarParaEliminarMenu" placeholder="Escribe el nombre del menú...">
        <!-- Se conserva style="display: none;" ya que tu JS modifica este display directamente en tiempo de ejecución -->
        <div id="listaSugerenciasEliminarMenu" class="lista-sugerencias" style="display: none;"></div>
    </div>

    <!-- Ficha de confirmación (Se muestra al seleccionar un menú) -->
    <!-- Se conserva style="display: none;" por control de flujo de tu JS -->
    <div id="contenedorFichaEliminarMenu" class="contenedor-confirmacion" style="display: none;">
        <div class="confirm-box">
            <p><b>Nombre:</b> <span id="lblDelMenuNombre">-</span></p>
            <p><b>Descripción:</b> <span id="lblDelMenuDescripcion">-</span></p>
            <p><b>Pertenece a (Padre):</b> <span id="lblDelMenuPadre">-</span></p>
            <p><b>Estado Actual:</b> <span id="lblDelMenuEstado">-</span></p>
            
            <!-- 
              Alerta dinámica: Se le quitan los estilos de fondo fijos del HTML 
              para que tu JavaScript aplique el borde o color dinámico limpiamente.
            -->
            <div id="alertaHijosMenu" class="alerta-dinamica" style="display: none;">
                <!-- El contenido se inyecta dinámicamente desde JS -->
            </div>
        </div>

        <!-- Acciones de control -->
        <div class="form-actions-simple">
            <button type="button" id="btnCancelarEliminarMenu" class="btn btn-secondary">Cancelar</button>
            <button type="button" id="btnConfirmarEliminarMenu" class="btn btn-danger-action">Confirmar Inactivación</button>
        </div>
    </div>
</div>
<!-- Enlace al JS Modular -->
<script src="js/borrar_menu.js"></script>
</body>
</html>
