<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Nuevo Menú</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/menus.css"> 
</head>
<body class="modulo-body">

<div class="modulo-container modulo-container-small">
    <div class="modulo-header">
        <div>
            <h2>➕ Registrar Nuevo Módulo / Menú</h2>
            <p>Añade una nueva sección principal o asígnala como submenú (hijo) de una existente.</p>
        </div>
    </div>

    <form id="formCrearMenu" class="form-grid">
        
        <!-- Selección de Padre -->
        <div class="form-group">
            <label>¿Depende de otro menú? (Padre) *</label>
            <select id="selectMenuPadre" name="id_menuPadre">
                <option value="">— Ninguno (Es un menú principal / Padre) —</option>
            </select>
        </div>

        <!-- Nombre del Menú -->
        <div class="form-group">
            <label>Nombre del Menú *</label>
            <input type="text" name="nombre" placeholder="Ej: Crear Factura o Gestión de Menús" required>
        </div>

        <!-- Descripción -->
        <div class="form-group">
            <label>Descripción / Detalles</label>
            <input type="text" name="descripcion" placeholder="Ej: Permite ingresar nuevas ventas al sistema">
        </div>

        <!-- URL (Dinámico) -->
        <!-- Se mantiene id="wrapperUrlMenu" y style="display: none;" porque tu JS controla la visibilidad con inline style -->
        <div class="form-group" id="wrapperUrlMenu" style="display: none;">
            <label>URL del Archivo HTML *</label>
            <input type="text" id="txtUrlMenu" name="url" placeholder="Ej: crear_usuario.html">
        </div>

        <!-- Botones de Acción -->
        <div class="form-actions">
            <button type="button" id="btnCancelarCrearMenu" class="btn btn-secondary">Limpiar</button>
            <button type="submit" class="btn btn-primary">💾 Guardar Menú</button>
        </div>
    </form>
</div>

<!-- Enlace al JS Modular -->
<script src="js/crear_menu.js"></script>
</body>
</html>
