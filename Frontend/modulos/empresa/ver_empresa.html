<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Empresa</title>
    <link rel="stylesheet" href="../../css/global.css"> 
    <link rel="stylesheet" href="css/empresa.css"> 
</head>
<body class="modulo-body">

<div class="modulo-container">
    <!-- Encabezado unificado para Entidad Única -->
    <div class="modulo-header">
        <div class="modulo-header-title">
            <h2>🏢 Información de la Empresa</h2>
            <p>Datos generales y fiscales configurados actualmente para la entidad comercial.</p>
        </div>
        <button id="btnRefrescarEmpresa" class="btn btn-secondary">🔄 Actualizar Datos</button>
    </div>

    <!-- Indicador de Carga -->
    <div id="loaderEmpresa" class="loading-container">
        <p>⏳ Recuperando información de la empresa...</p>
    </div>

    <!-- Contenedor Principal en modo Lectura -->
    <div id="vistaDatosEmpresa" style="display: none; margin-top: 20px;">
        <!-- Ficha técnica superior para el ID único -->
        <div style="background: #f8fafc; padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 20px; font-family: monospace; color: #64748b;">
            🔑 Identificador de Entidad (ID): <span id="lblEmpresaId" style="font-weight: bold; color: #1e293b;">-</span>
        </div>

        <!-- Grid de tarjetas de solo lectura para las columnas de la BD -->
        <div id="contenedorCamposEmpresa" class="grid-tarjetas">
            <!-- Cargado dinámicamente por JS -->
        </div>
    </div>
</div>

<!-- Enlace al JS de Empresa -->
<script src="js/ver_empresa.js"></script>
</body>
</html>
